highlights:
  - Built and scaled backend systems in Go and Ruby, from consulting projects to a high-traffic logistics SaaS platform.
  - Led a Rails 6 to Rails 8 modernization on a large monolith of more than 250k lines.
  - Defined backend engineering standards for testing, code organization, and linting to reduce onboarding friction and review churn.
